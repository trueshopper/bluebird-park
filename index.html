<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bluebird Park</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0f163a; }
  canvas { display: block; }
  #hud, #hud * { font-family: 'Avenir Next', 'Segoe UI', system-ui, sans-serif; user-select: none; }
  #hud { position: fixed; inset: 0; pointer-events: none; color: #3f4a5a; }
  #speed { position: absolute; top: 18px; left: 22px; font-size: 26px; font-weight: 800; color: #f2ede2; text-shadow: 0 1px 6px rgba(15,22,58,.7); }
  #scoreWrap { position: absolute; top: 18px; right: 22px; text-align: right; }
  #score { font-size: 26px; font-weight: 800; color: #f2ede2; text-shadow: 0 1px 6px rgba(15,22,58,.7); }
  #combo { font-size: 16px; font-weight: 700; color: #eab08a; min-height: 20px; text-shadow: 0 1px 5px rgba(15,22,58,.6); }
  #charge { position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%); width: 180px; height: 10px;
    background: rgba(74,85,104,.22); border-radius: 5px; opacity: 0; transition: opacity .15s; overflow: hidden; }
  #chargeFill { height: 100%; width: 0%; background: #d9b25f; border-radius: 5px; }
  #toasts { position: absolute; bottom: 90px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .toast { font-size: 24px; font-weight: 800; letter-spacing: .5px; color: #3f4a5a; background: rgba(250,246,238,.88);
    padding: 6px 18px; border-radius: 10px; opacity: 0; transform: translateY(12px); transition: all .25s; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.gone { opacity: 0; transform: translateY(-14px); }
  .toast.clean { color: #c96f4a; }
  .toast.sketchy { color: #8a6d3b; background: rgba(240,225,190,.9); }
  .toast.bail { color: #faf6ee; background: rgba(169,90,74,.92); }
  .toast.small { font-size: 15px; padding: 3px 12px; }
  #zoneToast { position: absolute; top: 16%; left: 0; right: 0; text-align: center; font-size: 34px; font-weight: 900;
    letter-spacing: 3px; color: #faf6ee; text-shadow: 0 2px 10px rgba(74,66,90,.5); opacity: 0; }
  #zoneToast.zshow { animation: zt 1.6s ease forwards; }
  @keyframes zt { 0% { opacity: 0; transform: scale(.85);} 15% {opacity: 1; transform: scale(1.02);} 75% {opacity: 1;} 100% {opacity: 0; transform: scale(1);} }
  .panel { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(74,66,90,.38); backdrop-filter: blur(4px); transition: opacity .3s; }
  .panel.hidden { opacity: 0; visibility: hidden; }
  .card { background: rgba(250,246,238,.96); border-radius: 22px; padding: 30px 42px; text-align: center; max-width: 460px; box-shadow: 0 18px 60px rgba(74,66,90,.3); }
  .card h1 { margin: 0; font-size: 40px; letter-spacing: 4px; color: #c96f4a; }
  .card h2 { margin: 6px 0 18px; font-size: 15px; font-weight: 600; color: #7a8699; }
  .ctlRow { display: flex; justify-content: space-between; gap: 18px; font-size: 14px; margin: 5px 0; color: #57616f; }
  .key { font-weight: 800; color: #4a5568; background: #efe7d8; border-radius: 6px; padding: 1px 8px; white-space: nowrap; }
  .go { margin-top: 18px; font-size: 18px; font-weight: 800; color: #c96f4a; animation: pulse 1.2s infinite; }
  @keyframes pulse { 50% { opacity: .45; } }
  .statRow { display: flex; justify-content: space-between; gap: 30px; font-size: 17px; margin: 8px 0; color: #57616f; }
  .statVal { font-weight: 800; color: #4a5568; }
  #restartHint { margin-top: 16px; font-size: 15px; font-weight: 700; color: #c96f4a; }
  #dev { position: fixed; top: 4px; left: 4px; color: #0a0; font: 12px monospace; display: none; z-index: 10; }
  #settingsBtn { position: absolute; bottom: 18px; right: 22px; pointer-events: auto; cursor: pointer;
    width: 44px; height: 44px; border-radius: 12px; border: none; font-size: 22px;
    background: rgba(250,246,238,.9); color: #4a5568; box-shadow: 0 4px 14px rgba(74,66,90,.25); }
  #settingsPanel .card { min-width: 340px; }
  #settingsPanel { pointer-events: auto; }
  .setRow { text-align: left; margin: 14px 0 4px; font-size: 15px; font-weight: 700; color: #57616f;
    display: flex; justify-content: space-between; }
  #turnSens, #soundVol { width: 100%; accent-color: #c96f4a; }
  .hint { font-size: 12px; color: #7b8ba3; margin-top: 4px; text-align: left; }
  #settingsClose { margin-top: 18px; pointer-events: auto; cursor: pointer; border: none; border-radius: 10px;
    padding: 9px 26px; font-size: 15px; font-weight: 800; background: #c96f4a; color: #faf6ee; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="speed"></div>
  <div id="scoreWrap"><div id="score"></div><div id="combo"></div></div>
  <div id="charge"><div id="chargeFill"></div></div>
  <div id="toasts"></div>
  <div id="zoneToast"></div>
  <div id="startOverlay" class="panel">
    <div class="card">
      <h1 id="gameTitle"></h1>
      <h2 id="gameSub"></h2>
      <div id="controlList"></div>
      <div class="go" id="pressStart"></div>
    </div>
  </div>
  <button id="settingsBtn" aria-label="settings">&#9881;</button>
  <div id="settingsPanel" class="panel hidden">
    <div class="card">
      <h1 id="settingsTitle" style="font-size:28px"></h1>
      <div class="setRow"><span id="turnSensLabel"></span><span id="turnSensVal"></span></div>
      <input type="range" id="turnSens" min="50" max="150" step="5" value="100">
      <div class="hint" id="turnSensHint"></div>
      <div class="setRow" style="margin-top:18px"><span id="soundVolLabel"></span><span id="soundVolVal"></span></div>
      <input type="range" id="soundVol" min="0" max="100" step="5" value="100">
      <button id="settingsClose"></button>
    </div>
  </div>
  <div id="finishPanel" class="panel hidden">
    <div class="card">
      <h1 id="finishTitle"></h1>
      <div id="finStats"></div>
      <div id="restartHint"></div>
    </div>
  </div>
</div>
<div id="dev"></div>
<script type="module" src="./game.js?v=perf2"></script>
<div id="buildTag" style="position:fixed;right:8px;bottom:6px;z-index:99;font:600 10px system-ui;color:rgba(255,255,255,.45);pointer-events:none;">build bluebird-3</div>
</body>
</html>
